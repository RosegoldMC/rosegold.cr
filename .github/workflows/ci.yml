name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  CheckFormat:
    if: github.repository != 'grepsedawk/sharded.cr'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oprypin/install-crystal@v1
        with:
          crystal: 1.19.1

      - name: Format
        run: crystal tool format --check

      - name: Set up Crystal cache
        uses: actions/cache@v4
        id: crystal-cache
        with:
          path: |
            ~/.cache/crystal
            bin/ameba
            lib
          key: ${{ runner.os }}-crystal-${{ matrix.crystal_version }}-${{ hashFiles('**/shard.yml') }}

      - name: Install shards
        if: steps.crystal-cache.outputs.cache-hit != 'true'
        run: shards check || shards install --ignore-crystal-version

      - name: Run ameba linter
        run: ./bin/ameba

  RunSpecs:
    if: github.repository != 'grepsedawk/sharded.cr'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        crystal_version:
          - "1.19.1"
          # - latest
        minecraft_version:
          - "1.21.8"
          - "1.21.11"
        experimental:
          - false

    steps:
      - uses: actions/checkout@v4

      - name: Start Minecraft ${{ matrix.minecraft_version }} server
        run: |
          cd spec
          MC_VERSION=${{ matrix.minecraft_version }} docker compose up -d --wait --wait-timeout 120

      - uses: oprypin/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal_version }}

      - name: Set up Crystal cache
        uses: actions/cache@v4
        id: crystal-cache
        with:
          path: |
            ~/.cache/crystal
            bin/ameba
            lib
          key: ${{ runner.os }}-crystal-${{ matrix.crystal_version }}-${{ hashFiles('**/shard.yml') }}

      - name: Install shards
        if: steps.crystal-cache.outputs.cache-hit != 'true'
        run: shards check || shards install --ignore-crystal-version

      - name: Create .env
        run: touch .env

      - name: Run integration tests
        id: first-run
        continue-on-error: true
        run: crystal spec

      - name: Retry failed specs
        if: steps.first-run.outcome == 'failure'
        run: crystal spec --only-failures
